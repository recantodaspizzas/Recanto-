<script>
  // Inicializa os ícones
  lucide.createIcons();

  // 1. CART PERSISTENCE: Carrega o carrinho do localStorage ou inicia vazio
  let cart = JSON.parse(localStorage.getItem('recanto_cart')) || [];
  const cartItems = document.getElementById('cartItems');

  function addCart(name, price) {
    // 2. ITEM GROUPING: Verifica se o item já existe no carrinho
    const existingItem = cart.find(item => item.name === name);

    if (existingItem) {
      existingItem.quantity += 1;
    } else {
      cart.push({ name, price, quantity: 1 });
    }

    updateCart();
  }

  function updateCart() {
    cartItems.innerHTML = '';
    
    let total = 0;
    let totalItems = 0;

    cart.forEach((item, index) => {
      const itemTotal = item.price * item.quantity;
      total += itemTotal;
      totalItems += item.quantity;

      // 3. BRAZILIAN CURRENCY: Formata o preço para o padrão BRL
      const formattedPrice = itemTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

      cartItems.innerHTML += `
      <div class="bg-gray-100 rounded-2xl p-4 mb-3 flex flex-col gap-3">
        <div class="flex justify-between items-center">
          <div>
            <h3 class="font-black text-gray-800">${item.name}</h3>
            <p class="text-gray-500 font-medium">${formattedPrice}</p>
          </div>
        </div>
        
        <div class="flex justify-between items-center mt-1">
          <div class="flex items-center gap-3 bg-white px-3 py-1 rounded-xl shadow-sm">
            <button onclick="decreaseQuantity(${index})" class="text-red-600 font-bold text-lg hover:scale-110 transition px-2">-</button>
            <span class="font-black text-gray-800">${item.quantity}</span>
            <button onclick="increaseQuantity(${index})" class="text-green-600 font-bold text-lg hover:scale-110 transition px-2">+</button>
          </div>
          <button onclick="removeItem(${index})" class="text-red-500 bg-red-50 p-2 rounded-xl hover:bg-red-100 transition">
            <i data-lucide="trash-2" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
      `;
    });

    // Salva o carrinho atualizado no localStorage
    localStorage.setItem('recanto_cart', JSON.stringify(cart));

    // Formata o total geral para exibição
    const formattedTotal = total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    document.getElementById('cartCount').innerText = totalItems;
    document.getElementById('cartTotal').innerText = formattedTotal;
    document.getElementById('sidebarTotal').innerText = formattedTotal;

    // Gera a mensagem para o WhatsApp
    let message = '🍕 *NOVO PEDIDO*\n\n';

    cart.forEach(item => {
      const itemTotal = item.price * item.quantity;
      const formattedItemTotal = itemTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      message += `• ${item.quantity}x ${item.name} - ${formattedItemTotal}\n`;
    });

    message += `\n💰 *Total:* R$ ${formattedTotal}`;

    // 4. URL ENCODING: Garante que os caracteres especiais não quebrem o link
    document.getElementById('finishOrder').href = `https://wa.me/5581997367519?text=${encodeURIComponent(message)}`;

    // Re-renderiza os ícones do Lucide para os novos itens adicionados dinamicamente
    lucide.createIcons();
  }

  function increaseQuantity(index) {
    cart[index].quantity += 1;
    updateCart();
  }

  function decreaseQuantity(index) {
    if (cart[index].quantity > 1) {
      cart[index].quantity -= 1;
    } else {
      removeItem(index);
    }
    updateCart();
  }

  function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
  }

  function openCart() {
    document.getElementById('cart').classList.add('cart-open');
  }

  function closeCart() {
    document.getElementById('cart').classList.remove('cart-open');
  }

  // Lógica de busca
  document.getElementById('search').addEventListener('keyup', function() {
    const value = this.value.toLowerCase();
    const products = document.querySelectorAll('.product');

    products.forEach(product => {
      const text = product.innerText.toLowerCase();
      if (text.includes(value)) {
        product.style.display = 'block';
      } else {
        product.style.display = 'none';
      }
    });
  });

  // Atualiza a visualização do carrinho ao carregar a página
  updateCart();

</script>
