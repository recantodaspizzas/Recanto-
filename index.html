<!-- NAVIGAÇÃO -->

<nav class="sticky top-0 z-50 bg-white/98 backdrop-blur-lg flex overflow-x-auto px-3 py-3 gap-2 shadow-lg justify-center border-b border-red-100">

    <a href="#pizzas"
       class="nav-link px-5 py-2.5 bg-gradient-to-r from-green-50 to-green-100 rounded-full text-sm font-bold text-italian-green hover:from-italian-green hover:to-green-700 hover:text-white transition-all whitespace-nowrap no-underline">
        🍕 Pizzas
    </a>

    <a href="#hamburgueres"
       class="nav-link px-5 py-2.5 bg-gradient-to-r from-orange-50 to-orange-100 rounded-full text-sm font-bold text-orange-700 hover:from-orange-600 hover:to-orange-700 hover:text-white transition-all whitespace-nowrap no-underline">
        🍔 Hambúrgueres
    </a>

    <a href="#bebidas"
       class="nav-link px-5 py-2.5 bg-gradient-to-r from-red-50 to-red-100 rounded-full text-sm font-bold text-italian-red hover:from-italian-red hover:to-red-700 hover:text-white transition-all whitespace-nowrap no-underline">
        🥤 Bebidas
    </a>

</nav>

<script>

const menuData = {

    pizzas: [

        {
            id: 'p1',
            name: 'Pizza Mussarela',
            desc: 'Molho de tomate, mussarela, tomate e orégano',
            image: 'images/pizza_mussarela.jpg.png.jpg',

            sizes: [
                { size: 'Brotinho', price: 25 },
                { size: 'Média', price: 35 },
                { size: 'Grande', price: 45 }
            ]
        },

        {
            id: 'p2',
            name: 'Pizza Calabresa',
            desc: 'Mussarela, calabresa, cebola e orégano',
            image: 'images/pizza_calabresa.jpg.png',

            sizes: [
                { size: 'Brotinho', price: 25 },
                { size: 'Média', price: 35 },
                { size: 'Grande', price: 45 }
            ]
        },

        {
            id: 'p3',
            name: 'Pizza Frango com Catupiry',
            desc: 'Frango desfiado e catupiry original',
            image: 'images/frango com catupiry.png',

            sizes: [
                { size: 'Brotinho', price: 28 },
                { size: 'Média', price: 38 },
                { size: 'Grande', price: 48 }
            ]
        }

    ],

    hamburgueres: [

        {
            id: 'h1',
            name: 'X-Burger Simples',
            desc: 'Blend bovino 150g e cheddar',
            price: 10,
            image: 'images/x-burguer simplis.png'
        }

    ],

    bebidas: [

        {
            id: 'b1',
            name: 'Coca-Cola 2L',
            desc: 'Gelada',
            price: 15,
            image: 'images/coca-cola.webp'
        }

    ]

};

let cart = {};

function renderMenu() {

    ['pizzas','hamburgueres','bebidas'].forEach(category => {

        const container =
            document.getElementById('menu-' + category);

        container.innerHTML =
            menuData[category].map(item => {

            /* ========= PIZZAS ========= */

            if(category === 'pizzas') {

                return `

                <div class="bg-white rounded-3xl overflow-hidden shadow-md mb-6 border border-red-100">

                    <div class="p-4 flex gap-4 items-start">

                        <img
                            src="${item.image}"
                            class="w-28 h-28 rounded-2xl object-cover shadow-md cursor-pointer hover:scale-105 transition"
                            onclick="openImageModal('${item.image}')"
                        >

                        <div class="flex-1">

                            <h3 class="playfair text-xl font-black text-gray-900">
                                ${item.name}
                            </h3>

                            <p class="text-sm text-gray-500 mt-1 leading-relaxed">
                                ${item.desc}
                            </p>

                            <button
                                onclick="togglePizzaOptions('${item.id}')"
                                class="mt-4 bg-gradient-to-r from-red-600 to-green-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:scale-105 transition-all shadow-lg"
                            >
                                Escolher tamanho 🍕
                            </button>

                        </div>

                    </div>

                    <!-- CASCATA -->

                    <div
                        id="pizza-options-${item.id}"
                        class="hidden px-4 pb-4"
                    >

                        ${item.sizes.map(size => `

                        <div class="bg-gray-50 rounded-2xl p-4 flex items-center justify-between mb-3 border border-gray-100 hover:border-red-200 transition">

                            <div>

                                <div class="font-black text-gray-800">
                                    ${size.size}
                                </div>

                                <div class="text-red-600 font-black text-lg">
                                    R$ ${size.price.toFixed(2).replace('.', ',')}
                                </div>

                            </div>

                            <button
                                onclick="addPizzaToCart(
                                    '${item.id}',
                                    '${item.name}',
                                    '${size.size}',
                                    ${size.price}
                                )"
                                class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-xl font-bold shadow-md transition"
                            >
                                Adicionar
                            </button>

                        </div>

                        `).join('')}

                    </div>

                </div>

                `;
            }

            /* ========= OUTROS ========= */

            return `

            <div class="bg-white rounded-2xl p-5 mb-4 flex gap-4 shadow-md hover:shadow-lg transition">

                <img
                    src="${item.image}"
                    class="w-20 h-20 rounded-xl object-cover"
                >

                <div class="flex-1">

                    <div class="playfair font-bold text-lg">
                        ${item.name}
                    </div>

                    <div class="text-xs text-gray-600 mt-1">
                        ${item.desc}
                    </div>

                    <div class="flex justify-between items-center mt-4">

                        <span class="font-black text-red-600 text-lg">
                            R$ ${item.price.toFixed(2).replace('.', ',')}
                        </span>

                        <button
                            onclick="addSimpleItem('${item.id}')"
                            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold text-sm"
                        >
                            Adicionar
                        </button>

                    </div>

                </div>

            </div>

            `;

        }).join('');

    });

}

/* ========= ABRIR CASCATA ========= */

function togglePizzaOptions(id) {

    const el =
        document.getElementById('pizza-options-' + id);

    el.classList.toggle('hidden');

}

/* ========= ADICIONAR PIZZA ========= */

function addPizzaToCart(id, name, size, price) {

    const key = id + '-' + size;

    if(!cart[key]) {

        cart[key] = {

            name: name + ' - ' + size,
            price: price,
            qty: 1

        };

    } else {

        cart[key].qty++;

    }

    updateCartBar();

}

/* ========= ITENS SIMPLES ========= */

function addSimpleItem(id) {

    const item =
        [...menuData.hamburgueres, ...menuData.bebidas]
        .find(i => i.id === id);

    if(!cart[id]) {

        cart[id] = {

            name: item.name,
            price: item.price,
            qty: 1

        };

    } else {

        cart[id].qty++;

    }

    updateCartBar();

}

/* ========= CARRINHO ========= */

function updateCartBar() {

    let total = 0;
    let count = 0;

    Object.values(cart).forEach(item => {

        total += item.price * item.qty;
        count += item.qty;

    });

    document.getElementById('cart-count').textContent =
        count + (count === 1 ? ' item' : ' itens');

    document.getElementById('cart-total').textContent =
        'R$ ' + total.toFixed(2).replace('.', ',');

    document.getElementById('cart-bar').style.bottom =
        count > 0 ? '20px' : '-100px';

}

/* ========= MODAL CARRINHO ========= */

function openCart() {

    const modal =
        document.getElementById('cart-modal');

    modal.classList.remove('hidden');

    const cartItems =
        document.getElementById('cart-items');

    const footer =
        document.getElementById('cart-footer');

    const empty =
        document.getElementById('cart-empty');

    if(Object.keys(cart).length === 0) {

        empty.classList.remove('hidden');
        footer.classList.add('hidden');
        cartItems.innerHTML = '';

        return;
    }

    empty.classList.add('hidden');
    footer.classList.remove('hidden');

    let total = 0;

    cartItems.innerHTML = Object.values(cart).map(item => {

        const subtotal =
            item.price * item.qty;

        total += subtotal;

        return `

        <div class="flex justify-between items-center py-4 border-b">

            <div>

                <div class="font-bold">
                    ${item.name}
                </div>

                <div class="text-sm text-gray-500">
                    ${item.qty}x
                </div>

            </div>

            <div class="font-black text-red-600">
                R$ ${subtotal.toFixed(2).replace('.', ',')}
            </div>

        </div>

        `;

    }).join('');

    document.getElementById('modal-total').textContent =
        'R$ ' + total.toFixed(2).replace('.', ',');

}

/* ========= FECHAR ========= */

function closeCart() {

    document.getElementById('cart-modal')
        .classList.add('hidden');

}

/* ========= WHATSAPP ========= */

function sendWhatsApp() {

    let msg =
        '🍕 *NOVO PEDIDO - Recanto das Pizzas*%0A%0A';

    let total = 0;

    Object.values(cart).forEach(item => {

        const subtotal =
            item.price * item.qty;

        total += subtotal;

        msg +=
            `*${item.qty}x* ${item.name} - R$ ${subtotal.toFixed(2).replace('.', ',')}%0A`;

    });

    msg += `%0A*TOTAL: R$ ${total.toFixed(2).replace('.', ',')}*`;

    window.open(
        `https://wa.me/5581997367519?text=${msg}`,
        '_blank'
    );

}

/* ========= IMAGEM ========= */

function openImageModal(src) {

    document.getElementById('modal-image').src = src;

    document.getElementById('image-modal')
        .classList.remove('hidden');

}

function closeImageModal() {

    document.getElementById('image-modal')
        .classList.add('hidden');

}

renderMenu();

</script>
